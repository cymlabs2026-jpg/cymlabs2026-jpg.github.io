<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-label="C&amp;M Labs">
  <defs>
    <linearGradient id="cmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Isotipo: C y M unidas por nodos y circuitos -->
  <g fill="none" stroke="url(#cmGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Letra C -->
    <path d="M40 26 A22 22 0 1 0 40 70"/>
    <!-- Letra M -->
    <path d="M56 70 V30 L70 50 L84 30 V70"/>
  </g>

  <!-- Circuitos de conexión -->
  <g stroke="#06B6D4" stroke-width="2" stroke-linecap="round" opacity="0.75">
    <path d="M40 26 L56 30" fill="none"/>
    <path d="M40 70 L56 70" fill="none"/>
    <path d="M84 30 L96 30 L96 20" fill="none"/>
    <path d="M84 70 L96 70 L96 80" fill="none"/>
    <path d="M18 48 L6 48" fill="none"/>
  </g>

  <!-- Nodos -->
  <g fill="#06B6D4">
    <circle cx="40" cy="26" r="4"/>
    <circle cx="40" cy="70" r="4"/>
    <circle cx="70" cy="50" r="4"/>
    <circle cx="96" cy="20" r="3.5"/>
    <circle cx="96" cy="80" r="3.5"/>
    <circle cx="6" cy="48" r="3.5"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="46" font-family="'Space Grotesk','Sora',system-ui,sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">C&amp;M</text>
  <text x="120" y="76" font-family="'Space Grotesk','Sora',system-ui,sans-serif" font-size="26" font-weight="500" fill="#06B6D4" letter-spacing="7">LABS</text>
</svg>
